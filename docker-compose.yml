services:

  scanlink-api:
    build:
      context: ./ScanLinkApi
    container_name: scanlink-api
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./ScanLinkApi/src/main/resources/scanlink-firebase-service-account.json:/app/scanlink-firebase-service-account.json:ro
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/scanlink-firebase-service-account.json

  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - scanlink-api
    restart: unless-stopped
