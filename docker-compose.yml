services:

  scanlink-api:
    build:
      context: ./ScanLinkApi
    container_name: scanlink-api
    restart: unless-stopped
    expose:
      - "8080"

  nginx:
    image: nginx:stable
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - scanlink-api
    restart: unless-stopped
